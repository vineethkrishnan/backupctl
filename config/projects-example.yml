projects:
  - name: vinsware
    enabled: true
    cron: '0 0 * * *'
    timeout_minutes: 30
    database:
      type: postgres
      host: postgres-vinsware
      port: 5432
      name: vinsware_db
      user: backup_user
      password: ${VINSWARE_DB_PASSWORD}
    assets:
      paths:
        - /data/vinsware/uploads
        - /data/vinsware/assets
    restic:
      repository_path: /backups/vinsware
      password: ${VINSWARE_RESTIC_PASSWORD}
      snapshot_mode: combined
    retention:
      local_days: 7
      keep_daily: 7
      keep_weekly: 4
      keep_monthly: 0
    encryption:
      enabled: true
      type: gpg
      recipient: vineeth.nk@vinsware.com
    hooks:
      pre_backup: 'curl -s http://vinsware-app:3000/maintenance/on'
      post_backup: 'curl -s http://vinsware-app:3000/maintenance/off'
    verification:
      enabled: true
    notification:
      type: slack
      config:
        webhook_url: https://hooks.slack.com/services/VINSWARE/SPECIFIC/HOOK
    monitor:
      type: uptime-kuma
      config:
        push_token: YOUR_VINSWARE_PUSH_TOKEN

  - name: project-x
    enabled: true
    cron: '30 1 * * *'
    database:
      type: mysql
      host: mysql-projectx
      port: 3306
      name: projectx_db
      user: backup_user
      password: ${PROJECTX_DB_PASSWORD}
    assets:
      paths:
        - /data/projectx/storage
    restic:
      repository_path: /backups/project-x
      snapshot_mode: separate
    retention:
      local_days: 14
      keep_daily: 14
      keep_weekly: 8
    notification:
      type: email
      config:
        smtp_host: smtp.gmail.com
        smtp_port: 587
        smtp_secure: true
        to: devops@company.com
        from: backup@company.com
        password: ${EMAIL_PASSWORD}
    monitor:
      type: uptime-kuma
      config:
        push_token: YOUR_PROJECTX_PUSH_TOKEN

  - name: project-y
    enabled: true
    cron: '0 2 * * *'
    database:
      type: postgres
      host: postgres-projecty
      port: 5432
      name: projecty_db
      user: backup_user
      password: ${PROJECTY_DB_PASSWORD}
    assets:
      paths: []
    restic:
      repository_path: /backups/project-y
      snapshot_mode: combined
    retention:
      local_days: 7
      keep_daily: 7
      keep_weekly: 4
